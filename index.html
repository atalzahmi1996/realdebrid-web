<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MovieHub 🎬</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>🎬 MovieHub</h1>
    <nav>
      <button onclick="showSection('movies')">📺 الأفلام</button>
      <button onclick="showSection('magnet')">🧲 تحويل المغناطيس</button>
    </nav>
  </header>

  <main>
    <section id="movies" class="section active">
      <div id="movie-list" class="grid"></div>
    </section>

    <section id="movie-details" class="section hidden"></section>

    <section id="magnet" class="section hidden">
      <h2>🧲 تحويل رابط مغناطيسي</h2>
      <input type="text" id="magnetInput" placeholder="أدخل رابط المغناطيس هنا" />
      <button onclick="convertMagnet()">تحويل</button>
      <div id="convertedResult"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
